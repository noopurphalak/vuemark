name: publish
on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      dry-run:
        description: "Dry run (skip actual publish and version bump)"
        required: false
        default: false
        type: boolean
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install
      - run: pnpm test
      - run: pnpm build
      - name: Bump version in package.json
        if: ${{ !inputs.dry-run }}
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.version-bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"
      - name: Commit version bump to main
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Bump version: ${VERSION}"
          git push origin main
      - name: Rebuild with bumped version
        if: ${{ !inputs.dry-run }}
        run: pnpm build
      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Read version from package.json (dry run)
        if: ${{ inputs.dry-run }}
        id: pkg-dry
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "Dry run — would publish compmark-vue@${{ steps.pkg-dry.outputs.version }} (no version bump applied)"
          else
            echo "Published compmark-vue@${{ steps.bump.outputs.version }}"
          fi
